<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PR Diff Plus</title>
  <style>
    body { font-family: -apple-system, sans-serif; width: 280px; padding: 12px; margin: 0; font-size: 13px; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    p { color: #666; margin: 0 0 10px; line-height: 1.4; }
    label { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
    button { width: 100%; margin-top: 10px; padding: 6px; cursor: pointer; }
    .hint { font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <h1>PR Diff Plus</h1>
  <p>Open any GitHub PR <code>/files</code> page, then use <kbd>?</kbd> for shortcuts.</p>
  <label><input type="checkbox" id="autoCollapse" checked /> Auto-collapse generated files</label>
  <label><input type="checkbox" id="syncReviewed" checked /> Mirror native "viewed" checkbox</label>
  <button id="clearReviewed">Clear reviewed state for current PR</button>
  <p class="hint" id="status"></p>
  <script src="popup.js"></script>
</body>
</html>

  <!-- Mock of GitHub's native left-side file tree (#pr-file-tree).
       Two structures coexist:

       2. Modern Primer-React TreeView rows with anchor hrefs only — these

  <!--
    Each file mimics the Primer-React modern PR diff structure where
    relevant: <button aria-label="Viewed" aria-pressed="..."> as the
    native viewed toggle. Click handler flips aria-pressed so the
    extension's mirror logic can be tested round-trip.
  -->
  <script>
    document.addEventListener('click', e => {
      const btn = e.target.closest('button[aria-label="Viewed"]');
      if (!btn) return;
      const cur = btn.getAttribute('aria-pressed') === 'true';
      btn.setAttribute('aria-pressed', cur ? 'false' : 'true');
    });

    // Pre-press a native Viewed button on load when ?prepress=<anchor-prefix>
    // is in the URL. Runs once DOM is ready (the buttons it targets are
    // parsed later in the document). Tests verify the extension picks up
    // already-viewed files into its `approved` set on init without breaking
    // other tests that assume a clean 0/N start.
    document.addEventListener('DOMContentLoaded', () => {
      const preset = new URLSearchParams(location.search).get('prepress');
      if (!preset) return;
      document.querySelectorAll('button[aria-label="Viewed"]').forEach(btn => {
        if ((btn.getAttribute('data-anchor') || '').startsWith(preset)) {
          btn.setAttribute('aria-pressed', 'true');
        }
      });
    });
  </script>
